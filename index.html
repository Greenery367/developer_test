    <style>
        * { box-sizing: border-box; }

        body {

        }

        /* Pixel progress bar */
        .header-bar {

            background: #111; border: 2px solid #333;
            position: absolute; top: 0; left: 0;
            overflow: hidden;
        }
        .header-fill {
            height: 100%;
            background: repeating-linear-gradient(90deg, var(--primary) 0px, var(--primary) 10px, rgba(0,242,255,0.4) 10px, rgba(0,242,255,0.4) 12px);
            width: 0%;

            box-shadow: 0 0 10px var(--primary);
        }

        /* ACCESS GRANTED style text */
        .pixel-label {
            font-family: 'Press Start 2P', monospace;
            color: var(--primary);
            font-size: 0.6rem;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }
        .pixel-label::before { content: '▶ '; }

        h1 {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.6rem; font-weight: 700;

        .nickname-input {

            border: 3px solid var(--primary);

        .nickname-input:focus { border-color: var(--accent); box-shadow: 4px 4px 0 var(--accent); }

        .btn {
            display: block; width: 100%;

            color: #000; font-weight: 700;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.72rem;
            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 5px 5px 0 var(--secondary);
            transition: transform 0.08s, box-shadow 0.08s;
            letter-spacing: 1px;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn:active { transform: translate(5px,5px); box-shadow: none; }

        .btn-sub {
            background: #111; border: 2px solid #444;
            color: #aaa; padding: 12px;
            cursor: pointer; flex: 1;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.85rem;
            box-shadow: 3px 3px 0 #333;
            transition: transform 0.08s, box-shadow 0.08s;

        .btn-sub:active { transform: translate(3px,3px); box-shadow: none; }

        .fade-in { animation: fadeIn 0.3s steps(6); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #question-page, #result-page { display: none; }

        /* Progress text */
        #progress {
            font-family: 'Press Start 2P', monospace;
            color: var(--accent);
            font-size: 0.65rem;
            letter-spacing: 2px;
            margin-bottom: 14px;

        .q-box {
            font-size: 1.1rem; margin-bottom: 22px; line-height: 1.8;

        .answer-btn {
            background: #06080f;

            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem; letter-spacing: 2px;
            color: var(--accent); margin-bottom: 14px;

        .char-portrait {

            box-shadow: 5px 5px 0 var(--secondary);

        }
        .char-portrait img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; }

        #char-name {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.6rem; font-weight: 700; margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(0,242,255,0.5);
        }
        #char-title {
            font-family: 'Press Start 2P', monospace;
            color: var(--primary); font-size: 0.55rem;
            letter-spacing: 2px; margin-bottom: 22px;
            line-height: 1.8;
        }

        /* Pixel stat bars */
        .stat-row { display: flex; align-items: center; margin-bottom: 8px; }
        .stat-label {
            width: 68px; text-align: left;
            color: var(--primary); font-size: 0.6rem;
            font-family: 'Press Start 2P', monospace;
        }
        .stat-bar-bg {
            flex: 1; height: 14px;
            background: #0d1020;
            border: 1px solid #1e2235;
            padding: 2px;
        }
        .stat-bar-fill {
            height: 100%;
            background: repeating-linear-gradient(90deg, var(--primary) 0px, var(--primary) 8px, rgba(0,242,255,0.3) 8px, rgba(0,242,255,0.3) 10px);
            transition: width 1s steps(16);
            box-shadow: 0 0 6px var(--primary);
        }

        #mbti-desc {
            text-align: left; font-size: 0.82rem; color: #8899bb;
            margin-top: 18px; line-height: 1.8;
            border-top: 2px solid #1a1f30;
            padding-top: 14px;
        }

        /* Banner link */
        .promo-banner {
            display: block; margin-top: 28px; text-decoration: none;
            border: 3px solid var(--secondary);
            box-shadow: 5px 5px 0 var(--primary);
            transition: transform 0.08s, box-shadow 0.08s;
        }
        .promo-banner:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--primary); }
        .promo-banner:active { transform: translate(5px,5px); box-shadow: none; }
        .promo-banner img { width: 100%; display: block; }
        .promo-banner-label {
            background: var(--secondary);
            text-align: center; padding: 12px;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem; letter-spacing: 1px;
            line-height: 1.8;
        }
    </style>

    <script>

        const characters = {
            DevOps: { name: "빌 게이트웨이", title: "무적의 인프라 군주", desc: "당신은 조용하지만, 세상이 돌아가게 만드는 사람입니다. 서버가 다운되면 누구보다 먼저 감지하고, 누구보다 조용히 복구합니다. 칭찬받길 기대하지 않아요 — 당신의 목표는 오직 '무중단'입니다.\n\n당신의 성격적 특징: 계획과 반복이 삶의 축입니다. 즉흥적인 배포 요청에 거부감을 느끼고, 롤백 계획 없는 팀원을 신뢰하지 않습니다. 신뢰는 PR로 쌓고, 감정은 모니터링 대시보드로 표현합니다.\n\n강점: 위기 대응 / 자동화 집착 / 흔들리지 않는 루틴\n약점: '일단 해봐요'라는 말에 두드러기가 납니다.\n케미 최악: 기획자 (왜 기획이 갑자기 바뀌죠?)", img: "char_devops.webp" },
            biz: { name: "마크 주크박스", title: "성공의 연금술사", desc: "코드는 당신에게 그저 도구입니다. 당신이 진짜 보는 건 시장, 타이밍, 그리고 유저의 지갑입니다. 회의 자리에서 누구보다 빠르게 MVP를 정의하고, 가장 먼저 '근데 이게 돈이 돼요?'를 묻습니다.\n\n당신의 성격적 특징: 사람을 빠르게 읽고, 흐름을 타는 데 탁월합니다. 완벽주의보다 속도를 선호하고, 기회가 보이면 망설임 없이 행동합니다. 다만 디테일 지옥에 빠진 팀원을 답답해합니다.\n\n강점: 시장 감각 / 설득력 / 결단력\n약점: 기술 부채? 나중에 누군가 해결하겠지.\n케미 최악: DBA (왜 이 쿼리가 3시간 걸리는지 지금 당장 설명해야 해요?)", img: "char_biz.webp" },
            AI: { name: "젠슨 황사장", title: "지능의 설계자", desc: "당신은 데이터를 통해 세상을 봅니다. 직관보다 패턴을, 감정보다 확률을 신뢰합니다. 남들이 '왜?'를 물을 때, 당신은 이미 모델을 돌려보고 있습니다.\n\n당신의 성격적 특징: 혼자서도 충분하고, 혼자가 편합니다. 복잡한 문제를 단순화하는 데 쾌감을 느끼며, 불확실한 것들에 확률을 부여해 안심합니다. 감성 코드는 잘 모르겠지만 loss function은 완벽히 이해합니다.\n\n강점: 패턴 인식 / 자동화 / 미래 예측\n약점: '그냥 느낌이 그래서요'라는 말을 이해하지 못합니다.\n케미 최악: Design (왜 이 버튼이 파란색이어야 하는지 수학적으로 설명 불가)", img: "char_ai.webp" },
            BE: { name: "김.0.한", title: "근본의 계승자", desc: "당신은 화려함보다 견고함을 선택합니다. 유행하는 프레임워크가 아닌, 10년 후에도 돌아가는 코드를 씁니다. 스택 오버플로우보다 공식 문서를 먼저 펼치고, 주석 없는 PR은 거들떠보지도 않습니다.\n\n당신의 성격적 특징: 원칙을 중요시하고, 한번 신뢰를 잃으면 회복이 어렵습니다. 처음 만나는 사람에게 쉽게 다가가지 않지만, 한번 팀원으로 인정하면 누구보다 든든한 동료가 됩니다. 코드 리뷰는 당신의 언어입니다.\n\n강점: 설계 안정성 / 원칙 수호 / 리뷰 퀄리티\n약점: 빠른 프로토타이핑? 그건 기술 부채입니다.\n케미 최악: biz (이 기능 내일까지 돼요?)", img: "char_be.webp" },
            Design: { name: "스티브 잡코리아", title: "감각의 혁명가", desc: "당신에게 1px은 단순한 수치가 아닙니다. 세계관입니다. 폰트 하나, 여백 하나에 의도를 담고, 아름답지 않은 인터페이스는 완성이라 부르지 않습니다.\n\n당신의 성격적 특징: 강한 심미적 기준이 있고, 타협을 잘 하지 않습니다. 공감 능력이 높아 사용자 입장에서 느끼는 '불편함'을 먼저 발견합니다. 다만 팀 회의에서 '일단 기능 먼저'라는 말에 조용히 상처받습니다.\n\n강점: 사용자 공감 / 브랜드 일관성 / 디테일 집착\n약점: '못생겨도 작동하면 됐지'라는 철학과 공존 불가.\n케미 최악: DevOps (UI가 왜 배포 대상이에요?)", img: "char_design.webp" },
            FE: { name: "브랜든 아이쿠", title: "화면의 지배자", desc: "당신은 사용자가 느끼는 '첫인상'을 만드는 사람입니다. 0.3초의 애니메이션, 스크롤의 탄력감, 버튼이 눌릴 때의 피드백 — 아무도 모르게, 하지만 모두가 느끼게 만들어야 합니다.\n\n당신의 성격적 특징: 호기심이 많고 트렌드에 민감합니다. 새로운 라이브러리가 나오면 일단 써보고 싶고, 새 CSS 기능이 생기면 핑계 없이 적용하고 싶습니다. 감각적이고 공감력이 높지만 가끔 번아웃이 옵니다.\n\n강점: 유저 인터랙션 / 빠른 시각화 / 최신 트렌드 적응\n약점: IE 지원 요청을 받으면 눈이 풀립니다.\n케미 최악: DBA (DB 최적화가 왜 프론트 속도랑 제 잘못이에요?)", img: "char_fe.webp" },
            DBA: { name: "다익스트라", title: "데이터 수호자", desc: "당신의 세계에는 거짓이 없습니다. 데이터는 항상 진실을 말하고, 당신은 그 진실을 0.01초 안에 꺼내올 수 있습니다. 인덱스를 잘못 잡은 쿼리를 보면 밤잠을 못 잡니다.\n\n당신의 성격적 특징: 완벽주의 성향이 강하고, 규칙과 무결성을 중요시합니다. 말수가 적지만 한번 입을 열면 숫자와 근거로 가득합니다. 타협보다 정확함을 선택하고, 논리 앞에 감정은 사치입니다.\n\n강점: 데이터 설계 / 성능 최적화 / 정확한 판단\n약점: '일단 넣고 나중에 정규화해요'라는 말을 듣는 순간 전투 모드 ON.\n케미 최악: FE (왜 프론트에서 JOIN을 7번 해요?)", img: "char_dba.webp" }
        };

        function sendEvent(name, params) {
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({ 'event': name, ...params });
        }

        function checkNickname() {
            userName = document.getElementById('nickname').value;
            if(!userName.trim()) { alert("닉네임을 입력하세요!"); return; }
            sendEvent('test_start', { 'nickname': userName });
            document.getElementById('start-page').style.display = 'none';
            document.getElementById('question-page').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            if(currentIdx >= questions.length) { renderResult(); return; }
            document.getElementById('bar').style.width = ((currentIdx+1)/questions.length*100)+'%';
            document.getElementById('progress').innerText = `${currentIdx+1} / ${questions.length}`;
            const q = questions[currentIdx];
            document.getElementById('question').innerText = q.q;
            const ansDiv = document.getElementById('answers');
            ansDiv.innerHTML = '';
            q.a.forEach(ans => {
                const btn = document.createElement('div');
                btn.className = 'answer-btn fade-in';
                btn.innerText = ans.t;
                btn.onclick = () => {
                    for(let k in ans.s) stats[k] += ans.s[k];
                    currentIdx++;
                    showQuestion();
                };
                ansDiv.appendChild(btn);
            });
        }

        function renderResult() {
            sendEvent('test_complete', { 'user': userName });
            document.getElementById('question-page').style.display = 'none';
            document.getElementById('result-page').style.display = 'block';
            
            const top = Object.keys(stats).reduce((a, b) => stats[a] > stats[b] ? a : b);
            const char = characters[top] || characters['BE'];
            
            document.getElementById('user-result-msg').innerText = `${userName}님의 클래스`;
            document.getElementById('char-img').src = char.img; // 이미지 경로 복구
            document.getElementById('char-name').innerText = char.name;
            document.getElementById('char-title').innerText = char.title;
            document.getElementById('mbti-desc').innerText = char.desc;
            
            const container = document.getElementById('stat-container');
            container.innerHTML = '';
            ["BE", "FE", "AI", "Design", "biz"].forEach(s => {
                const val = Math.min((stats[s] / 15) * 100 + 20, 100);
                container.innerHTML += `<div class="stat-row"><div class="stat-label">${s}</div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${val}%"></div></div></div>`;
            });
        }

        function saveImage() {
            html2canvas(document.getElementById('capture-area'), { 
                backgroundColor: '#141624',
                useCORS: true // 외부 이미지 허용
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${userName}_상태창_결과.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => alert("링크 복사 완료!"));
        }
    </script>
</body>
</html>
